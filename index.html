<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Timer</title>
  <style>
    /* Import font custom */
    @font-face {
      font-family: 'AlfredinoSemimono';
      src: url('AlfredinoSemimono.ttf') format('truetype');
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #000;
      color: white;
      font-family: 'AlfredinoSemimono', sans-serif; /* pakai font custom */
    }

    #countdown {
      font-size: 5rem;
      letter-spacing: 4px;
    }
  </style>
</head>
<body>
  <div id="countdown">23:00</div>

  <script>
    let duration = 23 * 60; // 23 menit dalam detik
    const countdownEl = document.getElementById("countdown");

    function updateCountdown() {
      const minutes = Math.floor(duration / 60);
      const seconds = duration % 60;
      countdownEl.textContent =
        String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");

      if (duration > 0) {
        duration--;
      }
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
